# 价值推送已并入 predict.yml(跟 cron-job.org 可靠触发一起跑)。
# 这里只保留手动触发,作为单独测试用,不再走不靠谱的 GitHub schedule。
name: value-push (手动测试)
on:
  workflow_dispatch: {}
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # 独立工作流没有 run.js 生成的本轮审计产物，因此只允许 DRY_RUN 诊断，绝不真实推 Bark。
      - name: 价值号只读诊断（不推送）
        run: node push_value.js
        env:
          DRY_RUN: '1'
