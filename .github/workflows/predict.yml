name: 足球预测·后台定时更新

on:
  schedule:
    - cron: '0 * * * *'
    - cron: '15 * * * *'
    - cron: '30 * * * *'
    - cron: '45 * * * *'
  workflow_dispatch: {}

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 取出仓库文件
        uses: actions/checkout@v4
      - name: 准备 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 安装无头浏览器
        run: |
          npm init -y
          npm i playwright
          npx playwright install --with-deps chromium
      - name: 运行一次预测
        run: node run.js
        env:
          AF_KEY: ${{ secrets.AF_KEY }}
      # ↓↓↓ 价值号推送:跟着这条可靠触发一起跑(预测刚写完云端→读最新数据推送)。
      # 即使上面预测步骤失败也照推(if: always),因为它独立读云端。脚本内部自带北京12:00–05:00时间窗+EV≥8%+去重+每日封顶。
      - name: 推送价值号(Bark)
        if: always()
        run: node push_value.js
        continue-on-error: true
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          # SB_KEY 可不填(脚本内置 publishable)
