name: 足球预测·后台定时更新

on:
  schedule:
    # 由每15分钟(0/15/30/45)降为每30分钟。选 :17/:47 避开整点/半点的 GitHub 调度拥堵(整点排队常延迟数分钟)。
    # ⚠️ 若 cron-job.org 仍每15分钟触发,总频率不会降——需同步把 cron-job.org 那条任务也改成每30分钟。
    - cron: '17 * * * *'
    - cron: '47 * * * *'
  workflow_dispatch: {}

# 防止多触发源(GitHub schedule + cron-job.org + 手动)重叠运行:
# push_value 对 fp_pushState/fp_valueBets 是读-改-写非原子,重叠会双推/互相覆盖。
# 排队而非取消(cancel-in-progress:false),保证每次都跑完。
concurrency:
  group: fp-predict
  cancel-in-progress: false

# 固定 Playwright 版本,让浏览器缓存 key 稳定(不锁版本则每次 npm i 可能装到新版→缓存永远 miss)。
env:
  PW_VERSION: '1.59.1'

jobs:
  predict:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: 取出仓库文件
        uses: actions/checkout@v4
      - name: 准备 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 缓存 Playwright 浏览器
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PW_VERSION }}
      - name: 安装无头浏览器
        # 缓存命中时 chromium 已在 ~/.cache/ms-playwright,install 会跳过下载(省 3-5 分钟),只装 apt 系统依赖。
        run: |
          npm init -y
          npm i playwright@${{ env.PW_VERSION }}
          npx playwright install --with-deps chromium
      - name: 测试盘口新鲜度门禁
        # football_new/profit_value 的 DOM 契约测试依赖前端源码，保留在本地全量回归；
        # 此部署仓库只运行能在纯后端 checkout 中独立执行的测试。
        run: node --test test/refresh_audit.test.js test/review_report.test.js push_value.test.js
      - name: 运行一次预测
        run: node run.js
        env:
          AF_KEY: ${{ secrets.AF_KEY }}
          SB_KEY: ${{ secrets.SB_KEY }}
          REFRESH_AUDIT_FILE: .refresh-audit.json
      # 二次从云端复核，防止页面刚写完后又被其它旧标签覆盖；失败会直接阻止下一步推送。
      - name: 审计本轮最新盘口与预测绑定
        run: node refresh_audit.js --artifact .refresh-audit.json
        env:
          SB_KEY: ${{ secrets.SB_KEY }}
          REFRESH_AUDIT_FILE: .refresh-audit.json
      # 价值号只能跟在“本轮刷新 + 云端二次审计”都成功之后运行。
      # 不再使用 if:always；抓盘失败、源赔率超过15分钟、盘口赔率串代时一律不推。
      - name: 推送价值号(Bark)
        run: node push_value.js
        continue-on-error: true
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          SB_KEY: ${{ secrets.SB_KEY }}
          REFRESH_AUDIT_FILE: .refresh-audit.json

      - name: 自动结算已完赛赛果
        if: always()
        run: node settle_results.js
        continue-on-error: true
        env:
          AF_KEY: ${{ secrets.AF_KEY }}
