name: 足球预测·后台定时更新

on:
  schedule:
    # 由每15分钟(0/15/30/45)降为每30分钟。选 :17/:47 避开整点/半点的 GitHub 调度拥堵(整点排队常延迟数分钟)。
    # ⚠️ 若 cron-job.org 仍每15分钟触发,总频率不会降——需同步把 cron-job.org 那条任务也改成每30分钟。
    - cron: '17 * * * *'
    - cron: '47 * * * *'
  workflow_dispatch: {}

# 防止多触发源(GitHub schedule + cron-job.org + 手动)重叠运行:
# push_value 对 fp_pushState/fp_valueBets 是读-改-写非原子,重叠会双推/互相覆盖。
# 排队而非取消(cancel-in-progress:false),保证每次都跑完。
concurrency:
  group: fp-predict
  cancel-in-progress: false

# 固定 Playwright 版本,让浏览器缓存 key 稳定(不锁版本则每次 npm i 可能装到新版→缓存永远 miss)。
env:
  PW_VERSION: '1.59.1'

jobs:
  predict:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: 取出仓库文件
        uses: actions/checkout@v4
      - name: 准备 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 缓存 Playwright 浏览器
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PW_VERSION }}
      - name: 安装无头浏览器
        # 缓存命中时 chromium 已在 ~/.cache/ms-playwright,install 会跳过下载(省 3-5 分钟),只装 apt 系统依赖。
        run: |
          npm init -y
          npm i playwright@${{ env.PW_VERSION }}
          npx playwright install --with-deps chromium
      - name: 运行一次预测
        run: node run.js
        env:
          AF_KEY: ${{ secrets.AF_KEY }}
      # ↓↓↓ 价值号推送:跟着这条可靠触发一起跑(预测刚写完云端→读最新数据推送)。
      # 即使上面预测步骤失败也照推(if: always),因为它独立读云端。脚本内部自带北京12:00–05:00时间窗+EV≥8%+去重+每日封顶。
      - name: 推送价值号(Bark)
        if: always()
        run: node push_value.js
        continue-on-error: true
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          # SB_KEY 可不填(脚本内置 publishable)

      - name: 自动结算已完赛赛果
        if: always()
        run: node settle_results.js
        continue-on-error: true
        env:
          AF_KEY: ${{ secrets.AF_KEY }}
